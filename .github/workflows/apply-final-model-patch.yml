name: Apply final Sonario model patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-test-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out update branch
        uses: actions/checkout@v4
        with:
          ref: fix/qwen36-cloud-qwen35-local
          fetch-depth: 0

      - name: Apply patch
        run: |
          git apply --check tools/final_model_update.patch
          git apply tools/final_model_update.patch

      - name: Install test dependency
        run: python -m pip install --disable-pip-version-check requests

      - name: Compile and test
        run: |
          python -m compileall -q app.py providers.py pipeline.py
          python -m unittest discover -s tests -v

      - name: Remove temporary patch machinery
        run: |
          rm -f tools/final_model_update.patch
          rm -f .github/workflows/apply-final-model-patch.yml

      - name: Commit tested result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden Qwen model update and add Python CI"
          git push origin HEAD:fix/qwen36-cloud-qwen35-local
