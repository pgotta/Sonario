name: Package current update branch

on:
  push:
    branches:
      - fix/qwen36-cloud-qwen35-local

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/qwen36-cloud-qwen35-local
      - run: |
          zip -qr Sonario-current.zip . -x '.git/*' '__pycache__/*' '*/__pycache__/*' 'credentials/groq_usage.json'
      - uses: actions/upload-artifact@v4
        with:
          name: Sonario-current
          path: Sonario-current.zip
          retention-days: 2
