name: Finalize Sonario model update

on:
  push:
    branches:
      - fix/qwen36-cloud-qwen35-local
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out update branch
        uses: actions/checkout@v4
        with:
          ref: fix/qwen36-cloud-qwen35-local
          fetch-depth: 0

      - name: Install test dependency
        run: python -m pip install --disable-pip-version-check requests

      - name: Apply final hardening
        run: python tools/finalize_model_update.py

      - name: Compile and test
        run: |
          python -m compileall -q app.py providers.py pipeline.py
          python -m unittest discover -s tests -v

      - name: Remove temporary updater
        run: |
          rm -f tools/finalize_model_update.py
          rm -f .github/workflows/finalize-model-update.yml

      - name: Commit tested result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden Qwen model update and add Python CI"
          git push origin HEAD:fix/qwen36-cloud-qwen35-local
