name: Apply launcher packaging update

on:
  push:
    branches:
      - fix/include-windows-launchers
    paths:
      - tools/update_launcher_packaging.py

permissions:
  contents: write

jobs:
  apply-test-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out launcher branch
        uses: actions/checkout@v4
        with:
          ref: fix/include-windows-launchers
          fetch-depth: 0

      - name: Update documentation
        run: python tools/update_launcher_packaging.py

      - name: Verify launchers and Python code
        run: |
          python - <<'PY'
          from pathlib import Path
          required = {
              "setup_all.bat": ["qwen3.5:9b", "qwen3.5:4b", "requirements.txt"],
              "run.bat": [r"venv\Scripts\python.exe", "python app.py"],
          }
          for name, markers in required.items():
              p = Path(name)
              assert p.is_file(), name
              text = p.read_text(encoding="utf-8")
              for marker in markers:
                  assert marker in text, (name, marker)
          PY
          python -m compileall -q app.py providers.py pipeline.py
          python -m unittest discover -s tests -v

      - name: Remove temporary updater
        run: |
          rm -f tools/update_launcher_packaging.py
          rm -f .github/workflows/apply-launcher-packaging.yml

      - name: Commit tested packaging update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Include Windows launchers in Git builds"
          git push origin HEAD:fix/include-windows-launchers
